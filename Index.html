<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Семейный альбом Язевых и Чевордаевых</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Семейный альбом</h1>
      <p>Язевы — Чевордаевы</p>
      <div class="filters">
        <button class="filter active" data-filter="all">Все</button>
        <button class="filter" data-filter="yazev">Язевы</button>
        <button class="filter" data-filter="chevardaev">Чевордаевы</button>
        <button class="filter" data-filter="samsnov">Самсоновы</button>
      </div>
    </header>

    <div class="cards-grid" id="cardsContainer"></div>

    <!-- Модальное окно для подробностей -->
    <div class="modal" id="modal">
      <div class="modal-content">
        <span class="modal-close">&times;</span>
        <img id="modal-img" src="" alt="" />
        <h2 id="modal-name"></h2>
        <p id="modal-details"></p>
      </div>
    </div>

    <footer>
      <p>Семейная летопись, составленная по рукописи Николая Ивановича Язева</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
